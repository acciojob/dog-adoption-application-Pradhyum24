<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <form name="Dog Adoption Form">

        <!-- Name -->
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Name">
        <br>

        <!-- Phone -->
        <label for="phone">Phone</label>
        <input type="text" id="phone" name="phone" placeholder="Phone Number">
        <br>

        <!-- Address -->
        <label for="address">Address</label>
        <input type="text" id="address" name="address" placeholder="Address">
        <br>

        <!-- Checkbox -->
        <label for="checkbox-1">Have you ever lived with a Dog before?</label>
        <input 
            type="checkbox" 
            id="checkbox-1" 
            name="dog_experience"
            value="Have you ever lived with a Dog before?"
        >
        <br>

        <!-- Multi Select -->
        <label for="multiSelect">Please select your preferred breeds</label>
        <select id="multiSelect" name="breeds" multiple>
            <option value="Rajapalayam">Rajapalayam</option>
            <option value="Chippiparai">Chippiparai</option>
            <option value="Indian Pariah">Indian Pariah</option>
        </select>
        <br>

        <!-- Submit -->
        <input type="submit" value="Submit" id="submit">

    </form>

</body>

</html>
